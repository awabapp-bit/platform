<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>تسجيل الدخول — منصة أواب الإلكترونية</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">
    <div class="pattern-strip"></div>
    <div class="auth-brand">
      <img src="logo.png" alt="شعار منصة أواب" onerror="this.style.display='none'">
      <h1>منصة أواب الإلكترونية</h1>
      <p>سجّل دخولك لمتابعة مسابقاتك ونقاطك</p>
    </div>

    <p class="basmala">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="loginForm" novalidate>
      <div class="field" id="emailField">
        <label for="email">البريد الإلكتروني المسجل</label>
        <input type="email" id="email" autocomplete="username" placeholder="example@email.com" required>
        <div class="field-error">من فضلك أدخل بريدًا إلكترونيًا صحيحًا</div>
      </div>

      <div class="field" id="passwordField">
        <label for="password">كلمة المرور</label>
        <div class="password-toggle-wrap">
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
          <button type="button" class="password-toggle" id="togglePass" aria-label="إظهار كلمة المرور"></button>
        </div>
        <div class="field-error">كلمة المرور مطلوبة</div>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="rememberMe" checked>
        تذكرني على هذا الجهاز
      </label>

      <button type="submit" class="btn btn-primary" id="loginBtn">تسجيل الدخول</button>
    </form>

    <div class="auth-switch">
      ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="app-shell.js"></script>
<script>
  document.getElementById('togglePass').innerHTML = icon('eye');

  auth.onAuthStateChanged(function (user) {
    if (!user) return;
    db.ref('users/' + user.uid).once('value').then(function (snap) {
      const data = snap.val();
      if (data && data.blocked === true) { auth.signOut(); return; }
      window.location.href = 'home.html';
    });
  });

  if (new URLSearchParams(window.location.search).get('blocked') === '1') {
    document.getElementById('formMsg').innerHTML = icon('lock', 'icon-sm') + ' تم وقف حسابك من قبل إدارة المنصة. تواصل مع الدعم الفني لمزيد من التفاصيل.';
    document.getElementById('formMsg').className = 'form-msg show error';
  }

  const form = document.getElementById('loginForm');
  const formMsg = document.getElementById('formMsg');
  const loginBtn = document.getElementById('loginBtn');
  const togglePass = document.getElementById('togglePass');
  const passwordInput = document.getElementById('password');

  togglePass.addEventListener('click', function () {
    const isPass = passwordInput.type === 'password';
    passwordInput.type = isPass ? 'text' : 'password';
    togglePass.innerHTML = icon(isPass ? 'eyeSlash' : 'eye');
    togglePass.setAttribute('aria-label', isPass ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
  });

  const savedEmail = localStorage.getItem('awab_last_email');
  if (savedEmail) document.getElementById('email').value = savedEmail;

  function showMsg(text, type) {
    formMsg.textContent = text;
    formMsg.className = 'form-msg show ' + type;
  }

  function mapError(code) {
    const map = {
      'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة',
      'auth/user-not-found': 'لا يوجد حساب مسجل بهذا البريد الإلكتروني',
      'auth/wrong-password': 'كلمة المرور غير صحيحة',
      'auth/invalid-credential': 'البريد الإلكتروني أو كلمة المرور غير صحيحة',
      'auth/too-many-requests': 'محاولات كثيرة، حاول مرة أخرى بعد قليل',
      'auth/network-request-failed': 'تعذر الاتصال بالشبكة، تحقق من الإنترنت',
      'auth/operation-not-allowed': 'تسجيل الدخول بالبريد وكلمة المرور غير مفعّل في Firebase بعد',
      'auth/unauthorized-domain': 'هذا النطاق غير مصرّح له بالدخول من إعدادات Firebase'
    };
    return map[code] || ('حدث خطأ أثناء تسجيل الدخول (' + (code || 'غير معروف') + ')، حاول مرة أخرى');
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    formMsg.classList.remove('show');

    const email = document.getElementById('email').value.trim();
    const password = passwordInput.value;
    const remember = document.getElementById('rememberMe').checked;

    if (!email || !password) {
      showMsg('من فضلك أدخل البريد الإلكتروني وكلمة المرور', 'error');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'جارٍ تسجيل الدخول...';

    const persistence = remember
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;

    auth.setPersistence(persistence)
      .then(function () { return auth.signInWithEmailAndPassword(email, password); })
      .then(function (cred) {
        return db.ref('users/' + cred.user.uid).once('value').then(function (snap) {
          const data = snap.val();
          if (data && data.blocked === true) {
            return auth.signOut().then(function () { return Promise.reject({ code: 'awab/blocked' }); });
          }
          const updates = { lastLoginAt: firebase.database.ServerValue.TIMESTAMP };
          db.ref('users/' + cred.user.uid).update(updates);
          if (remember) { localStorage.setItem('awab_last_email', email); }
          else { localStorage.removeItem('awab_last_email'); }
          window.location.href = 'home.html';
        });
      })
      .catch(function (err) {
        if (err.code === 'awab/blocked') {
          showMsg('تم وقف حسابك من قبل إدارة المنصة. تواصل مع الدعم الفني لمزيد من التفاصيل.', 'error');
        } else {
          showMsg(mapError(err.code), 'error');
        }
        loginBtn.disabled = false;
        loginBtn.textContent = 'تسجيل الدخول';
      });
  });
</script>
</body>
</html>
