<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>الرئيسية — منصة أواب الإلكترونية</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header" id="appHeader"></header>

<main class="page">
  <h1 class="page-title">المسابقات المتاحة</h1>
  <p class="page-sub">اختر مسابقة لبدء المحاضرات وجمع النقاط</p>

  <div id="content">
    <div class="center-loading"><div class="loader"></div></div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="app-shell.js"></script>
<script>
  requireAuth(function (user, userData) {
    renderAppHeader(userData, { showPoints: true });
    renderFooter();
    loadCompetitions();
  });

  function loadCompetitions() {
    const content = document.getElementById('content');
    db.ref('competitions').on('value', function (snap) {
      const data = snap.val() || {};
      const ids = Object.keys(data);

      if (ids.length === 0) {
        content.innerHTML =
          '<div class="empty-state"><div class="empty-state-icon">' + icon('trophy', 'icon-xl') + '</div>' +
          '<p>لا توجد مسابقات متاحة حاليًا، تابعنا قريبًا</p></div>';
        return;
      }

      let html = '<div class="grid">';
      ids.forEach(function (id) {
        const c = data[id];
        const lessonsCount = c.lessons ? Object.keys(c.lessons).length : 0;
        html +=
          '<a class="comp-card" href="competition.html?id=' + encodeURIComponent(id) + '">' +
            '<div class="cover">' +
              (c.coverUrl
                ? '<img src="' + escapeHtml(c.coverUrl) + '" alt="">'
                : '<span class="cover-icon">' + icon('trophy', 'icon-lg') + '</span>') +
            '</div>' +
            '<div class="body">' +
              '<h3>' + escapeHtml(c.title || 'مسابقة') + '</h3>' +
              (c.description ? '<p>' + escapeHtml(c.description) + '</p>' : '') +
              '<div class="meta">' + icon('bookOpen', 'icon-sm') + ' ' + lessonsCount + ' محاضرة</div>' +
            '</div>' +
          '</a>';
      });
      html += '</div>';
      content.innerHTML = html;
    });
  }
</script>
</body>
</html>
