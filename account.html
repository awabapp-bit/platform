<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>الحساب الشخصي — منصة أواب الإلكترونية</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header" id="appHeader"></header>

<main class="page" style="max-width:560px;">
  <a class="back-link" href="home.html"><svg class="icon icon-sm" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg> الرئيسية</a>
  <h1 class="page-title">الحساب الشخصي</h1>
  <p class="page-sub">بياناتك الأساسية وإعدادات كلمة المرور</p>

  <div class="info-card">
    <div class="info-row"><span class="label">الاسم</span><span class="value" id="userName">—</span></div>
    <div class="info-row"><span class="label">البريد الإلكتروني</span><span class="value" id="userEmail">—</span></div>
    <div class="info-row"><span class="label">النقاط</span><span class="value" id="userPoints">—</span></div>
  </div>

  <button class="btn btn-outline" id="openChangePass">تغيير كلمة المرور</button>

  <div id="changePassWrap" style="display:none; margin-top:22px;">
    <div class="info-card">
      <h3 style="font-family:'Amiri',serif;color:var(--primary-dark);margin:0 0 16px;">تغيير كلمة المرور</h3>
      <div class="form-msg" id="passMsg"></div>

      <form id="changePassForm" novalidate>
        <div class="field">
          <label for="oldPassword">كلمة المرور الحالية</label>
          <div class="password-toggle-wrap">
            <input type="password" id="oldPassword" autocomplete="current-password" required>
            <button type="button" class="password-toggle" data-target="oldPassword" aria-label="إظهار كلمة المرور"></button>
          </div>
        </div>
        <div class="field">
          <label for="newPassword">كلمة المرور الجديدة</label>
          <div class="password-toggle-wrap">
            <input type="password" id="newPassword" autocomplete="new-password" required>
            <button type="button" class="password-toggle" data-target="newPassword" aria-label="إظهار كلمة المرور"></button>
          </div>
        </div>
        <div class="field">
          <label for="confirmNewPassword">تأكيد كلمة المرور الجديدة</label>
          <div class="password-toggle-wrap">
            <input type="password" id="confirmNewPassword" autocomplete="new-password" required>
            <button type="button" class="password-toggle" data-target="confirmNewPassword" aria-label="إظهار كلمة المرور"></button>
          </div>
        </div>

        <ul class="rules-list" id="rulesList">
          <li data-rule="length"><span class="tick"></span> 8 أحرف على الأقل</li>
          <li data-rule="upper"><span class="tick"></span> حرف كبير (A-Z)</li>
          <li data-rule="lower"><span class="tick"></span> حرف صغير (a-z)</li>
          <li data-rule="number"><span class="tick"></span> رقم واحد على الأقل</li>
          <li data-rule="symbol"><span class="tick"></span> رمز واحد على الأقل (!@#$...)</li>
          <li data-rule="match"><span class="tick"></span> تطابق كلمتَي المرور</li>
        </ul>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary" id="savePassBtn">حفظ كلمة المرور</button>
          <button type="button" class="btn btn-outline" id="cancelChangePass">إلغاء</button>
        </div>
      </form>
    </div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="app-shell.js"></script>
<script src="password-rules.js"></script>
<script>
  document.querySelectorAll('.password-toggle').forEach(function (btn) { btn.innerHTML = icon('eye'); });

  let currentUser = null;

  requireAuth(function (user, userData) {
    currentUser = user;
    renderAppHeader(userData, { showPoints: false });
    renderFooter();
    document.getElementById('userName').textContent = userData.name || '—';
    document.getElementById('userEmail').textContent = userData.email || user.email || '—';
    document.getElementById('userPoints').textContent = userData.points || 0;
  });

  const openBtn = document.getElementById('openChangePass');
  const wrap = document.getElementById('changePassWrap');
  const cancelBtn = document.getElementById('cancelChangePass');

  openBtn.addEventListener('click', function () { wrap.style.display = 'block'; openBtn.style.display = 'none'; });
  cancelBtn.addEventListener('click', function () {
    wrap.style.display = 'none';
    openBtn.style.display = 'inline-flex';
    document.getElementById('changePassForm').reset();
    updateRules();
  });

  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const input = document.getElementById(btn.dataset.target);
      const isPass = input.type === 'password';
      input.type = isPass ? 'text' : 'password';
      btn.innerHTML = icon(isPass ? 'eyeSlash' : 'eye');
      btn.setAttribute('aria-label', isPass ? 'إخفاء كلمة المرور' : 'إظهار كلمة المرور');
    });
  });

  const rulesList = document.getElementById('rulesList');
  const newPasswordInput = document.getElementById('newPassword');
  const confirmNewInput = document.getElementById('confirmNewPassword');

  function updateRules() {
    const rules = checkPasswordRules(newPasswordInput.value, confirmNewInput.value);
    renderPasswordRules(rulesList, rules);
    return rules;
  }
  newPasswordInput.addEventListener('input', updateRules);
  confirmNewInput.addEventListener('input', updateRules);

  function showPassMsg(text, type) {
    const el = document.getElementById('passMsg');
    el.textContent = text;
    el.className = 'form-msg show ' + type;
  }

  function mapError(code) {
    const map = {
      'auth/wrong-password': 'كلمة المرور الحالية غير صحيحة',
      'auth/invalid-credential': 'كلمة المرور الحالية غير صحيحة',
      'auth/weak-password': 'كلمة المرور الجديدة ضعيفة',
      'auth/requires-recent-login': 'يرجى تسجيل الدخول من جديد ثم إعادة المحاولة',
      'auth/network-request-failed': 'تعذر الاتصال بالشبكة'
    };
    return map[code] || 'حدث خطأ، حاول مرة أخرى';
  }

  document.getElementById('changePassForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const oldPassword = document.getElementById('oldPassword').value;
    const newPassword = newPasswordInput.value;
    const rules = updateRules();

    if (!oldPassword) { showPassMsg('من فضلك أدخل كلمة المرور الحالية', 'error'); return; }
    if (!allRulesPass(rules)) { showPassMsg('من فضلك استوفِ جميع شروط كلمة المرور الجديدة', 'error'); return; }

    const saveBtn = document.getElementById('savePassBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'جارٍ الحفظ...';

    const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPassword);

    currentUser.reauthenticateWithCredential(credential)
      .then(function () { return currentUser.updatePassword(newPassword); })
      .then(function () {
        showPassMsg('تم تغيير كلمة المرور بنجاح', 'success');
        document.getElementById('changePassForm').reset();
        updateRules();
        saveBtn.disabled = false;
        saveBtn.textContent = 'حفظ كلمة المرور';
      })
      .catch(function (err) {
        showPassMsg(mapError(err.code), 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = 'حفظ كلمة المرور';
      });
  });
</script>
</body>
</html>
