<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>الاختبار — منصة أواب الإلكترونية</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header" id="appHeader"></header>

<main class="page" style="max-width:720px;">
  <a class="back-link" id="backLink" href="competition.html"><svg class="icon icon-sm" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg> رجوع للمحاضرة</a>
  <h1 class="page-title" id="examTitle">جارٍ التحميل...</h1>

  <div id="content">
    <div class="center-loading"><div class="loader"></div></div>
  </div>
</main>

<footer class="site-footer" id="siteFooter"></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="app-shell.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const compId = params.get('comp');
  const lessonId = params.get('lesson');
  const examId = params.get('exam');
  if (!compId || !lessonId || !examId) window.location.href = 'home.html';

  document.getElementById('backLink').href = 'competition.html?id=' + encodeURIComponent(compId);

  let currentUser = null;
  let compData = null;

  requireAuth(function (user, userData) {
    currentUser = user;
    renderAppHeader(userData, { showPoints: true });
    renderFooter();
    load();
  });

  function load() {
    db.ref('competitions/' + compId).once('value').then(function (snap) {
      if (!snap.exists()) { window.location.href = 'home.html'; return; }
      compData = snap.val();
      const lessons = compData.lessons || {};
      const lesson = lessons[lessonId];
      if (!lesson || !lesson.exams || !lesson.exams[examId]) { window.location.href = 'competition.html?id=' + encodeURIComponent(compId); return; }

      db.ref('userProgress/' + currentUser.uid + '/' + compId).once('value').then(function (pSnap) {
        const progressData = pSnap.val() || {};
        const access = getLessonAccessState(lessons, progressData, lessonId);
        const content = document.getElementById('content');
        const exam = lesson.exams[examId];
        document.getElementById('examTitle').textContent = exam.title || 'الاختبار';

        if (!access.allowed) {
          const reasonText = access.reason === 'release' ? 'هذه المحاضرة لم يحن معادها بعد.' : 'أكمِل المحاضرة السابقة أولاً.';
          content.innerHTML =
            '<div class="already-done-card"><div class="big-icon" style="color:var(--gold);">' + icon('lock', 'icon-xl') + '</div>' +
            '<h3 style="margin:10px 0 6px; color:var(--primary-dark);">هذا الاختبار مغلق</h3><p class="muted">' + reasonText + '</p></div>';
          return;
        }

        const lessonProgress = progressData[lessonId] || {};
        const examProgress = (lessonProgress.exams && lessonProgress.exams[examId]) || null;

        if (examProgress && examProgress.completed) {
          content.innerHTML =
            '<div class="already-done-card">' +
              '<div class="big-icon">' + icon('circleCheck', 'icon-xl') + '</div>' +
              '<h3 style="margin:10px 0 6px; color:var(--primary-dark);">أنجزت هذا الاختبار بالفعل</h3>' +
              '<p class="muted">حصلت على <strong>' + (examProgress.earnedPoints || 0) + '</strong> نقطة · ' + (examProgress.score || 0) + ' إجابة صحيحة</p>' +
              '<p class="muted" style="font-size:12px;">الاختبار له محاولة واحدة فقط، ولا يمكن إعادته.</p>' +
              '<a class="btn btn-outline btn-sm" style="width:auto; margin:14px auto 0;" href="competition.html?id=' + encodeURIComponent(compId) + '">العودة للمحاضرة</a>' +
            '</div>';
          return;
        }

        renderExam(exam, lesson);
      });
    });
  }

  function renderExam(exam, lesson) {
    const content = document.getElementById('content');
    const questions = exam.questions || {};
    const qIds = Object.keys(questions);

    if (qIds.length === 0) {
      content.innerHTML = '<div class="already-done-card"><p class="muted">لا توجد أسئلة في هذا الاختبار بعد.</p></div>';
      return;
    }

    let html = '<div class="attempt-note">' + icon('hourglass', 'icon-sm') + ' هذا الاختبار له محاولة واحدة فقط، فكّر جيدًا قبل التسليم.</div>';
    html += '<form id="quizForm">';
    qIds.forEach(function (qId, i) {
      const q = questions[qId];
      html += '<div class="quiz-q"><p class="q-text">' + (i + 1) + '. ' + escapeHtml(q.text) + '</p><div class="quiz-options">';
      (q.options || []).forEach(function (opt, oi) {
        html += '<label class="quiz-option"><input type="radio" name="q_' + qId + '" value="' + oi + '" required> ' + escapeHtml(opt) + '</label>';
      });
      html += '</div></div>';
    });
    html += '<button type="submit" class="btn btn-primary">تسليم الإجابات نهائيًا</button></form>';
    html += '<div id="quizResultWrap"></div>';
    content.innerHTML = html;

    document.getElementById('quizForm').addEventListener('submit', function (e) {
      e.preventDefault();
      if (!confirm('هل أنت متأكد؟ لن تتمكن من إعادة هذا الاختبار بعد التسليم.')) return;

      let earnedPoints = 0;
      let correctCount = 0;

      qIds.forEach(function (qId) {
        const q = questions[qId];
        const selected = document.querySelector('input[name="q_' + qId + '"]:checked');
        const selectedIndex = selected ? parseInt(selected.value, 10) : -1;
        const isCorrect = selectedIndex === q.correct;
        if (isCorrect) { correctCount++; earnedPoints += Number(q.points) || 0; }

        document.querySelectorAll('input[name="q_' + qId + '"]').forEach(function (input) {
          const optionEl = input.closest('.quiz-option');
          const idx = parseInt(input.value, 10);
          if (idx === q.correct) { optionEl.classList.add('correct'); optionEl.insertAdjacentHTML('beforeend', icon('circleCheck', 'icon-md')); }
          else if (input.checked) { optionEl.classList.add('wrong'); optionEl.insertAdjacentHTML('beforeend', icon('circleXmark', 'icon-md')); }
          input.disabled = true;
        });
      });

      document.getElementById('quizForm').querySelector('button[type="submit"]').style.display = 'none';

      const progRef = db.ref('userProgress/' + currentUser.uid + '/' + compId + '/' + lessonId);
      progRef.child('exams/' + examId).set({
        completed: true, score: correctCount, earnedPoints: earnedPoints, answeredAt: firebase.database.ServerValue.TIMESTAMP
      }).then(function () {
        return db.ref('users/' + currentUser.uid + '/points').transaction(function (current) { return (current || 0) + earnedPoints; });
      }).then(function () {
        return progRef.once('value');
      }).then(function (snap) {
        const lp = snap.val() || {};
        const c = computeLessonCompletion(lesson, lp);
        return progRef.update({ completed: c.completed, earnedPoints: c.earnedPoints });
      }).then(function () {
        document.getElementById('quizResultWrap').innerHTML =
          '<div class="already-done-card" style="margin-top:20px;">' +
            '<div class="score" style="font-size:40px; font-weight:800; color:var(--gold); font-family:\'Amiri\',serif;">' + earnedPoints + '</div>' +
            '<p class="muted">نقطة مكتسبة · ' + correctCount + ' من ' + qIds.length + ' إجابات صحيحة</p>' +
            '<a class="btn btn-primary btn-sm" style="width:auto; margin:14px auto 0;" href="competition.html?id=' + encodeURIComponent(compId) + '">العودة للمحاضرة</a>' +
          '</div>';
      });
    });
  }
</script>
</body>
</html>
